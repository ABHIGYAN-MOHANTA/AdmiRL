<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kueue Admission Advisor Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .container {
            width: 100%;
            max-width: 920px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-card {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 12px;
            padding: 16px 18px;
        }

        .status-label {
            color: #7d7d97;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }

        .status-value {
            color: #f3f4ff;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .score-badge {
            font-size: 1.5rem;
            font-weight: 700;
            min-width: 60px;
            text-align: center;
            padding: 4px 12px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .score-high {
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }

        .score-mid {
            color: #facc15;
            background: rgba(250, 204, 21, 0.1);
        }

        .score-low {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        /* ─── Decision panel ────────────────────────────────────── */
        .decision-panel {
            background: #1a1a2e;
            border: 1px solid #2a2a40;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
        }

        .decision-panel h3 {
            font-size: 1rem;
            font-weight: 500;
            color: #a78bfa;
            margin-bottom: 12px;
        }

        .decision-timestamp {
            color: #666;
            font-size: 0.8rem;
            margin-bottom: 16px;
        }

        .decision-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .decision-section {
            background: #12121e;
            border-radius: 8px;
            padding: 16px;
        }

        .decision-section h4 {
            font-size: 0.85rem;
            color: #60a5fa;
            margin-bottom: 8px;
        }

        .decision-section pre {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #aaa;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 200px;
            overflow-y: auto;
        }

        .score-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a40;
        }

        .score-result:last-child {
            border-bottom: none;
        }

        .score-result .name {
            color: #c0c0d0;
            font-size: 0.9rem;
        }

        .no-data {
            color: #555;
            font-style: italic;
            text-align: center;
            padding: 40px;
        }

        /* ─── Status bar ────────────────────────────────────────── */
        .status-bar {
            margin-top: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
            transition: all 0.3s;
            opacity: 0;
        }

        .status-bar.show {
            opacity: 1;
        }

        .status-bar.success {
            background: rgba(74, 222, 128, 0.1);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
        }

        .status-bar.error {
            background: rgba(248, 113, 113, 0.1);
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.2);
        }

        .refresh-info {
            margin-top: 16px;
            color: #555;
            font-size: 0.75rem;
            text-align: center;
        }
    </style>
</head>

<body>
    <h1>Kueue Admission Advisor Monitor</h1>
    <p class="subtitle">Live admission-policy status and the latest Kueue admission advice</p>

    <div class="container">
        <div class="status-grid" id="runtime-status">
            <div class="status-card">
                <div class="status-label">Current Effective Policy</div>
                <div class="status-value" id="status-policy">blocked_guard</div>
            </div>
            <div class="status-card">
                <div class="status-label">Loaded Checkpoint</div>
                <div class="status-value" id="status-checkpoint">none</div>
            </div>
            <div class="status-card">
                <div class="status-label">Last Advice</div>
                <div class="status-value" id="status-last-decision">n/a</div>
            </div>
            <div class="status-card">
                <div class="status-label">Last Advice Source</div>
                <div class="status-value" id="status-last-source">n/a</div>
            </div>
        </div>

        <div id="decision-view">
            <p class="no-data">Waiting for first scheduling decision...</p>
        </div>

        <div class="status-bar" id="status"></div>
        <p class="refresh-info">Auto-refreshes every 2 seconds</p>
    </div>

    <script>
        let statusTimeout = null;

        // ─── Score helpers ──────────────────────────────────────────
        function getScoreClass(score) {
            if (score >= 70) return 'score-high';
            if (score >= 40) return 'score-mid';
            return 'score-low';
        }

        async function fetchLastDecision() {
            try {
                const res = await fetch('/api/last-decision');
                const data = await res.json();
                renderDecision(data);
            } catch (e) {
                // silent
            }
        }

        function renderDecision(data) {
            const view = document.getElementById('decision-view');

            if (!data.timestamp) {
                view.innerHTML = '<p class="no-data">Waiting for first scheduling decision...</p>';
                return;
            }

            const response = data.response || {};
            const rankedWorkloads = response.ranked_workloads || [];
            const pairScores = response.pair_scores || {};
            const sortedScores = Object.entries(pairScores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 12)
                .map(([name, score]) => {
                    const cls = getScoreClass(score);
                    return `<div class="score-result">
                        <span class="name">${name}</span>
                        <span class="score-badge ${cls}" style="font-size:1.1rem">${Number(score).toFixed(1)}</span>
                    </div>`;
                }).join('');

            view.innerHTML = `
                <div class="decision-panel">
                    <h3>Latest Admission Advice</h3>
                    <div class="decision-timestamp">⏱ ${new Date(data.timestamp).toLocaleString()}</div>
                    <div class="decision-timestamp">Source: ${response.advisor_source || response.source || 'unknown'}</div>
                    <div class="decision-grid">
                        <div class="decision-section">
                            <h4>Ranked Workloads</h4>
                            <pre>${JSON.stringify(rankedWorkloads, null, 2)}</pre>
                        </div>
                        <div class="decision-section">
                            <h4>Top Pair Scores</h4>
                            ${sortedScores || '<p class="no-data">No scores</p>'}
                        </div>
                    </div>
                </div>
                <div class="decision-panel">
                    <h3>Request / Response</h3>
                    <div class="decision-grid">
                        <div class="decision-section">
                            <h4>Request</h4>
                            <pre>${JSON.stringify(data.request || {}, null, 2)}</pre>
                        </div>
                        <div class="decision-section">
                            <h4>Response</h4>
                            <pre>${JSON.stringify(response, null, 2)}</pre>
                        </div>
                    </div>
                </div>
            `;
        }

        async function fetchRuntimeStatus() {
            try {
                const res = await fetch('/api/runtime-status');
                const data = await res.json();
                document.getElementById('status-policy').textContent = data.effective_policy || data.runtime_policy || 'unknown';
                const checkpointPath = data.learned_checkpoint_path || '';
                const checkpointLabel = checkpointPath ? checkpointPath.split('/').pop() : 'none';
                document.getElementById('status-checkpoint').textContent = checkpointLabel;
                document.getElementById('status-last-decision').textContent =
                    data.last_decision_timestamp ? new Date(data.last_decision_timestamp).toLocaleTimeString() : 'n/a';
                document.getElementById('status-last-source').textContent =
                    data.last_decision_source || 'n/a';
            } catch (e) {
                // silent
            }
        }

        // ─── Status bar ─────────────────────────────────────────────
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status-bar show ${type}`;
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => el.classList.remove('show'), 2000);
        }

        // ─── Init ───────────────────────────────────────────────────
        fetchRuntimeStatus();
        fetchLastDecision();
        setInterval(() => {
            fetchRuntimeStatus();
            fetchLastDecision();
        }, 2000);
    </script>
</body>

</html>
