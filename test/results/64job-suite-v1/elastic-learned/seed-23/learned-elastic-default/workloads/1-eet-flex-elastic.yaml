{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "1-eet-flex-elastic-0",
    "namespace": "kueue-learned-elastic-default-1777269661",
    "labels": {
      "kueue.x-k8s.io/queue-name": "lq-eet-small",
      "kueue.x-k8s.io/pod-group-name": "1-eet-flex-elastic",
      "admirl.ai/workload-class": "small",
      "admirl.ai/topology-preference": "C",
      "gpu-topology-hint": "C",
      "kueue.x-k8s.io/pod-group-pod-index": "0"
    },
    "annotations": {
      "kueue.x-k8s.io/pod-group-total-count": "1",
      "admirl.ai/workload-name": "1-eet-flex-elastic",
      "admirl.ai/fairshare-group": "eet-elastic-flex",
      "admirl.ai/topology-domain": "C",
      "admirl.ai/provisioning-pending": "false",
      "admirl.ai/runtime-seconds": "1080.000",
      "admirl.ai/scaled-runtime-seconds": "11",
      "admirl.ai/scaled-runtime-rf-4gpu-c": "9",
      "admirl.ai/scaled-runtime-rf-4gpu-a": "11"
    }
  },
  "spec": {
    "restartPolicy": "Never",
    "schedulerName": "default-scheduler",
    "affinity": {
      "nodeAffinity": {
        "requiredDuringSchedulingIgnoredDuringExecution": {
          "nodeSelectorTerms": [
            {
              "matchExpressions": [
                {
                  "key": "admirl.ai/flavor",
                  "operator": "In",
                  "values": [
                    "rf-4gpu-c",
                    "rf-4gpu-a"
                  ]
                }
              ]
            }
          ]
        }
      }
    },
    "containers": [
      {
        "name": "worker",
        "image": "busybox",
        "command": [
          "sh",
          "-c",
          "runtime=\"$BASE_RUNTIME_SECONDS\"; case \"$NODE_NAME\" in *rf-4gpu-a*) runtime=\"$RUNTIME_RF_4GPU_A\" ;; *rf-4gpu-c*) runtime=\"$RUNTIME_RF_4GPU_C\" ;; esac; sleep \"$runtime\""
        ],
        "env": [
          {
            "name": "NODE_NAME",
            "valueFrom": {
              "fieldRef": {
                "fieldPath": "spec.nodeName"
              }
            }
          },
          {
            "name": "BASE_RUNTIME_SECONDS",
            "value": "11"
          },
          {
            "name": "RUNTIME_RF_4GPU_A",
            "value": "11"
          },
          {
            "name": "RUNTIME_RF_4GPU_C",
            "value": "9"
          }
        ],
        "resources": {
          "requests": {
            "cpu": "20",
            "memory": "80Gi",
            "admirl.ai/gpu": "4"
          },
          "limits": {
            "admirl.ai/gpu": "4"
          }
        }
      }
    ]
  }
}
