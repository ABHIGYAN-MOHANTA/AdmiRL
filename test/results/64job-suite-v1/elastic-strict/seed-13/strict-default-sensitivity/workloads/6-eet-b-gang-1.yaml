{
  "apiVersion": "v1",
  "kind": "Pod",
  "metadata": {
    "name": "6-eet-b-gang-1-0",
    "namespace": "kueue-strict-default-sensitivity-1777267176",
    "labels": {
      "kueue.x-k8s.io/queue-name": "lq-eet-gang",
      "kueue.x-k8s.io/pod-group-name": "6-eet-b-gang-1",
      "admirl.ai/workload-class": "gang",
      "kueue.x-k8s.io/pod-group-pod-index": "0"
    },
    "annotations": {
      "kueue.x-k8s.io/pod-group-total-count": "2",
      "admirl.ai/workload-name": "6-eet-b-gang-1",
      "admirl.ai/fairshare-group": "eet-gang-b1",
      "admirl.ai/topology-domain": "",
      "admirl.ai/provisioning-pending": "false",
      "admirl.ai/runtime-seconds": "900.000",
      "admirl.ai/scaled-runtime-seconds": "8",
      "admirl.ai/scaled-runtime-rf-4gpu-b": "8"
    }
  },
  "spec": {
    "restartPolicy": "Never",
    "schedulerName": "default-scheduler",
    "affinity": {
      "nodeAffinity": {
        "requiredDuringSchedulingIgnoredDuringExecution": {
          "nodeSelectorTerms": [
            {
              "matchExpressions": [
                {
                  "key": "admirl.ai/flavor",
                  "operator": "In",
                  "values": [
                    "rf-4gpu-b"
                  ]
                }
              ]
            }
          ]
        }
      }
    },
    "containers": [
      {
        "name": "worker",
        "image": "busybox",
        "command": [
          "sh",
          "-c",
          "runtime=\"$BASE_RUNTIME_SECONDS\"; case \"$NODE_NAME\" in *rf-4gpu-b*) runtime=\"$RUNTIME_RF_4GPU_B\" ;; esac; sleep \"$runtime\""
        ],
        "env": [
          {
            "name": "NODE_NAME",
            "valueFrom": {
              "fieldRef": {
                "fieldPath": "spec.nodeName"
              }
            }
          },
          {
            "name": "BASE_RUNTIME_SECONDS",
            "value": "8"
          },
          {
            "name": "RUNTIME_RF_4GPU_B",
            "value": "8"
          }
        ],
        "resources": {
          "requests": {
            "cpu": "20",
            "memory": "80Gi",
            "admirl.ai/gpu": "4"
          },
          "limits": {
            "admirl.ai/gpu": "4"
          }
        }
      }
    ]
  }
}
